<main class="container-fluid py-4">
  <div class="app-page-title"><h2>Dashboard da Coordenação</h2></div>
  <div class="app-card p-4">
<div class="card p-4 mb-4">
    <h4 class="mb-3">Filtros</h4>

    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Ensino</label>
        <select id="filtroEnsino" class="form-select" onchange="onEnsinoChange()">
          <option value="">Todos</option>
          <option value="fundamental">Fundamental</option>
          <option value="medio">Médio</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label">Turma</label>
        <select id="filtroTurma" class="form-select" onchange="loadConselhos()">
          <option value="">Todas</option>
        </select>
      </div>

      <div class="col-md-2">
        <label class="form-label">Bimestre</label>
        <select id="filtroBimestre" class="form-select" onchange="loadConselhos()">
          <option value="">Todos</option>
          <option value="1">1º</option>
          <option value="2">2º</option>
          <option value="3">3º</option>
          <option value="4">4º</option>
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label">Status</label>
        <select id="filtroStatus" class="form-select" onchange="loadConselhos()">
          <option value="">Todos</option>
          <option value="em_andamento">Em andamento</option>
          <option value="finalizado">Finalizado</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card p-4">
    <div class="table-responsive mt-3">
      <table class="table table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th>Turma</th>
            <th>Ensino</th>
            <th>Bimestre</th>
            <th>Data</th>
            <th>Status</th>
            <th style="width: 280px;">Ações</th>
          </tr>
        </thead>
        <tbody id="listaConselhos"></tbody>
      </table>
	  <div class="col-md-3 d-flex align-items-end">
			<button class="btn btn-success w-100" onclick="iniciarConselho()">
				Iniciar Conselho
			</button>
		</div>
    </div>
  </div>


</div>
</main>

  <!-- Bootstrap JS (necessário para dropdown/navbar/modal etc.) -->

<script src="js/modals.js"></script>
